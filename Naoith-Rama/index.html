<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Naioth Ramah Centre — Nyamata, Rwanda</title>
<meta name="description" content="Naioth Ramah Centre is a serene event venue in Nyamata, Bugesera — weddings, conferences, church events and celebrations." />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ================= NAV ================= -->
<header class="nav" id="nav">
  <div class="container nav-inner">
    <a href="#" class="brand">
      <span class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3.2"/></svg>
      </span>
      <span id="brand-name">Naioth Ramah Centre</span>
    </a>
    <nav class="nav-links" id="nav-links"></nav>
    <div class="nav-cta">
      <a href="#contact" class="btn btn-ghost" id="nav-cta-label">Book a visit</a>
      <button class="nav-toggle" id="nav-toggle" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</header>

<!-- ================= HERO ================= -->
<section class="hero">
  <div class="ripple-field" aria-hidden="true">
    <svg viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid slice">
      <circle class="ripple-ring" cx="500" cy="420" r="60" style="animation-delay:0s"/>
      <circle class="ripple-ring" cx="500" cy="420" r="60" style="animation-delay:1.75s"/>
      <circle class="ripple-ring" cx="500" cy="420" r="60" style="animation-delay:3.5s"/>
      <circle class="ripple-ring" cx="500" cy="420" r="60" style="animation-delay:5.25s"/>
    </svg>
  </div>
  <div class="hero-grain" aria-hidden="true"></div>

  <div class="container hero-inner">
    <p class="eyebrow on-dark" id="hero-eyebrow">Nyamata · Bugesera · Rwanda</p>
    <h1 id="hero-headline">Still waters, gathered people.</h1>
    <p class="hero-sub" id="hero-sub"></p>
    <div class="hero-ctas">
      <a href="#contact" class="btn btn-primary" id="hero-cta-primary">Plan your event</a>
      <a href="#spaces" class="btn btn-ghost" id="hero-cta-secondary">Explore the spaces</a>
    </div>

    <div class="hero-stats reveal reveal-stagger" id="hero-stats"></div>
  </div>

  <div class="scroll-cue"><span>Scroll</span><span class="line"></span></div>
</section>
<svg class="wave-divider" viewBox="0 0 1440 74" preserveAspectRatio="none"><path d="M0,32 C240,80 480,0 720,24 C960,48 1200,8 1440,40 L1440,74 L0,74 Z"/></svg>

<!-- ================= ABOUT ================= -->
<section class="about pad" id="about">
  <div class="container">
    <div class="about-grid">
      <div class="reveal">
        <p class="eyebrow" id="about-eyebrow"></p>
        <h2 class="section-title" id="about-title" style="margin-top:14px;"></h2>
      </div>
      <div class="about-copy reveal" id="about-copy"></div>
    </div>
    <div class="feature-list reveal reveal-stagger" id="about-features"></div>
  </div>
</section>
<svg class="wave-divider wave-to-pale" viewBox="0 0 1440 74" preserveAspectRatio="none"><path d="M0,40 C240,8 480,64 720,36 C960,8 1200,56 1440,24 L1440,74 L0,74 Z"/></svg>

<!-- ================= SPACES ================= -->
<section class="spaces pad" id="spaces">
  <div class="container">
    <div class="section-head reveal">
      <p class="eyebrow" id="spaces-eyebrow"></p>
      <h2 class="section-title" id="spaces-title"></h2>
      <p class="section-subtitle" id="spaces-subtitle"></p>
    </div>
    <div class="space-list" id="space-list"></div>
  </div>
</section>

<!-- ================= EVENTS ================= -->
<section class="events pad" id="events">
  <div class="container">
    <div class="section-head reveal">
      <p class="eyebrow on-dark" id="events-eyebrow"></p>
      <h2 class="section-title" id="events-title"></h2>
    </div>
    <div class="event-grid reveal reveal-stagger" id="event-grid"></div>
  </div>
</section>
<svg class="wave-divider wave-to-ink" viewBox="0 0 1440 74" preserveAspectRatio="none" style="transform:scaleY(-1)"><path d="M0,32 C240,80 480,0 720,24 C960,48 1200,8 1440,40 L1440,74 L0,74 Z"/></svg>

<!-- ================= GALLERY ================= -->
<section class="gallery pad" id="gallery">
  <div class="container">
    <div class="section-head reveal">
      <p class="eyebrow" id="gallery-eyebrow"></p>
      <h2 class="section-title" id="gallery-title"></h2>
    </div>
    <div class="gallery-grid reveal" id="gallery-grid"></div>
  </div>
</section>

<!-- ================= TESTIMONIALS ================= -->
<section class="testimonials pad" id="testimonials">
  <div class="container">
    <div class="section-head reveal" style="align-items:center; text-align:center; margin-left:auto; margin-right:auto;">
      <p class="eyebrow" id="t-eyebrow" style="margin:0 auto;"></p>
      <h2 class="section-title" id="t-title" style="margin:0 auto;"></h2>
    </div>
    <div class="t-wrap reveal" id="t-wrap"></div>
  </div>
</section>

<!-- ================= CONTACT ================= -->
<section class="contact pad" id="contact">
  <div class="container contact-grid">
    <div class="reveal">
      <p class="eyebrow on-dark" id="contact-eyebrow"></p>
      <h2 class="section-title" id="contact-title" style="margin-top:14px;"></h2>
      <p class="section-subtitle" id="contact-subtitle"></p>
      <div class="contact-info" id="contact-info"></div>
      <div class="map-wrap" id="map-wrap"></div>
    </div>

    <div class="reveal">
      <form class="form-card" id="contact-form">
        <div class="field-row">
          <div class="field"><label for="f-name">Name</label><input id="f-name" type="text" placeholder="Your full name" required></div>
          <div class="field"><label for="f-phone">Phone</label><input id="f-phone" type="tel" placeholder="+250 ..." required></div>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="f-event">Event type</label>
            <select id="f-event">
              <option>Wedding</option>
              <option>Church event</option>
              <option>Conference / Corporate</option>
              <option>Family celebration</option>
              <option>Other</option>
            </select>
          </div>
          <div class="field"><label for="f-date">Preferred date</label><input id="f-date" type="date"></div>
        </div>
        <div class="field"><label for="f-guests">Estimated guests</label><input id="f-guests" type="number" placeholder="e.g. 250"></div>
        <div class="field"><label for="f-message">Message</label><textarea id="f-message" placeholder="Tell us a little about your event"></textarea></div>
        <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">Send enquiry</button>
        <p class="form-note" id="form-note"></p>
      </form>
    </div>
  </div>
</section>

<!-- ================= FOOTER ================= -->
<footer class="footer">
  <div class="container">
    <div class="footer-inner">
      <p class="footer-note" id="footer-note"></p>
      <div class="footer-socials" id="footer-socials"></div>
    </div>
    <p class="footer-copy" id="footer-copy"></p>
  </div>
</footer>

<script src="script.js"></script>
</body>
</html>
