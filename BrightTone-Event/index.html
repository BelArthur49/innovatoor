<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="description" content="BrightTone Event — Professional sound systems for concerts, weddings, and corporate events across Rwanda.">
    <title>BrightTone Event — Sound That Moves Crowds</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="noise"></div>
    <div id="loader">
        <div class="loader-ring"></div>
        <div class="loader-txt">Loading</div>
    </div>

    <!-- NAV -->
    <nav class="nav">
        <a href="index.html" class="nav-logo"></a>
        <div class="nav-links"></div>
        <a href="contact.html" class="nav-cta desktop" data-nav-cta></a>
        <button class="nav-burger" aria-label="Menu"><span></span><span></span><span></span></button>
    </nav>
    <div class="nav-drawer"></div>

    <!-- HERO -->
    <section class="hero">
        <canvas id="hero-canvas"></canvas>
        <div class="hero-grid"></div>
        <div class="hero-vignette"></div>
        <div class="hero-content">
            <div class="hero-badge ha d1"><span class="pulse"></span><span id="home-hero-badge"></span></div>
            <h1 class="hero-title ha d2" id="home-hero-title"></h1>
            <p class="hero-sub ha d3" id="home-hero-sub"></p>
            <div class="hero-btns ha d4">
                <a href="#" class="btn-primary" id="home-cta-primary"></a>
                <a href="#" class="btn-outline" id="home-cta-secondary"></a>
            </div>
        </div>
        <div class="scroll-hint">Scroll</div>
    </section>

    <!-- STATS -->
    <div class="stats-bar">
        <div class="stats-inner" id="stats-grid"></div>
    </div>

    <!-- SERVICES -->
    <section class="section">
        <div class="section-inner">
            <span class="lbl">What We Do</span>
            <h2 class="sec-title">Every Event Deserves<br>Perfect Sound</h2>
            <p class="sec-body">From intimate ceremonies to massive open-air concerts, BrightTone brings precision audio engineering to every occasion.</p>
            <div class="cards-grid" id="cards-grid"></div>
        </div>
    </section>

    <!-- TESTIMONIALS -->
    <section class="section dark-section">
        <div class="section-inner">
            <span class="lbl">What Clients Say</span>
            <h2 class="sec-title">Trusted by Event Makers</h2>
            <div class="testi-grid" id="testi-grid"></div>
        </div>
    </section>

    <!-- CTA BAND -->
    <section class="section cta-band">
        <div class="section-inner">
            <div class="abars" style="justify-content:center;margin-bottom:28px"></div>
            <h2 class="sec-title" id="cta-title"></h2>
            <p class="sec-body" id="cta-body"></p>
            <a href="#" class="btn-primary" id="cta-btn" style="display:inline-flex"></a>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="footer-inner">
            <div>
                <div class="footer-brand-name"></div>
                <p class="footer-tagline"></p>
                <div class="footer-social"></div>
            </div>
            <div>
                <div class="fcol-title">Pages</div>
                <div class="flinks"></div>
            </div>
            <div>
                <div class="fcol-title">Find Us</div>
                <div style="font-size:.85rem;color:var(--text2);line-height:2">
                    Kigali, Rwanda<br>
                    <a href="https://www.instagram.com/brighttone_event/" target="_blank" class="footer-ig"></a>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <span class="footer-copy"></span>
            <a href="https://www.instagram.com/brighttone_event/" target="_blank" rel="noopener" style="font-size:.72rem;color:var(--primary2)">@brighttone_event</a>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>

</html>
